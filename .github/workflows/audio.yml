name: Generate narration audio

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "scripts/generate_audio.py"
      - ".github/workflows/audio.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: narration-audio
  cancel-in-progress: true

jobs:
  tts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install TTS deps
        run: pip install edge-tts beautifulsoup4
      - name: Generate / refresh narration MP3s
        run: python scripts/generate_audio.py
      - name: Commit audio if changed
        run: |
          git config user.name  "audio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio
          if git diff --staged --quiet; then
            echo "No audio changes."
          else
            git commit -m "chore: regenerate narration audio"
            git push
          fi
